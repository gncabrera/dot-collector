@if (megaSetType) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(megaSetType.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="megaSetTypeDeleteDialogHeading">Confirm delete operation</h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p id="jhi-delete-megaSetType-heading">Are you sure you want to delete Mega Set Type {{ megaSetType.id }}?</p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban" />&nbsp;<span>Cancel</span>
      </button>

      <button id="jhi-confirm-delete-megaSetType" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times" />&nbsp;<span>Delete</span>
      </button>
    </div>
  </form>
}
