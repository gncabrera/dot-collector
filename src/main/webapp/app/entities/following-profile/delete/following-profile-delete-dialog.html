@if (followingProfile) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(followingProfile.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="followingProfileDeleteDialogHeading">Confirm delete operation</h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p id="jhi-delete-followingProfile-heading">Are you sure you want to delete Following Profile {{ followingProfile.id }}?</p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban" />&nbsp;<span>Cancel</span>
      </button>

      <button id="jhi-confirm-delete-followingProfile" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times" />&nbsp;<span>Delete</span>
      </button>
    </div>
  </form>
}
