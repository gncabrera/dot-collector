<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 id="jhi-mega-part-sub-part-count-heading" data-cy="MegaPartSubPartCountCreateUpdateHeading">
        Create or edit a Mega Part Sub Part Count
      </h2>

      <div>
        <jhi-alert-error />

        @if (editForm.controls.id.value !== null) {
          <div class="mb-3">
            <label class="form-label" for="field_id">ID</label>
            <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
          </div>
        }

        <div class="mb-3">
          <label class="form-label" for="field_count">Count</label>
          <input type="number" class="form-control" name="count" id="field_count" data-cy="count" formControlName="count" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_part">Part</label>
          <select class="form-control" id="field_part" data-cy="part" name="part" formControlName="part" [compareWith]="compareMegaPart">
            <option [ngValue]="null"></option>
            @for (megaPartOption of megaPartsSharedCollection(); track $index) {
              <option [ngValue]="megaPartOption">{{ megaPartOption.id }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_parentPart">Parent Part</label>
          <select
            class="form-control"
            id="field_parentPart"
            data-cy="parentPart"
            name="parentPart"
            formControlName="parentPart"
            [compareWith]="compareMegaPart"
          >
            <option [ngValue]="null"></option>
            @for (megaPartOption of megaPartsSharedCollection(); track $index) {
              <option [ngValue]="megaPartOption">{{ megaPartOption.id }}</option>
            }
          </select>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban" />&nbsp;<span>Cancel</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving()"
          class="btn btn-primary"
        >
          <fa-icon icon="save" />&nbsp;<span>Save</span>
        </button>
      </div>
    </form>
  </div>
</div>
