@if (megaPartSubPartCount) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(megaPartSubPartCount.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="megaPartSubPartCountDeleteDialogHeading">Confirm delete operation</h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p id="jhi-delete-megaPartSubPartCount-heading">
        Are you sure you want to delete Mega Part Sub Part Count {{ megaPartSubPartCount.id }}?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban" />&nbsp;<span>Cancel</span>
      </button>

      <button id="jhi-confirm-delete-megaPartSubPartCount" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times" />&nbsp;<span>Delete</span>
      </button>
    </div>
  </form>
}
