<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (environmentVariable(); as environmentVariableRef) {
      <div>
        <h2 data-cy="environmentVariableDetailsHeading"><span>Environment Variable</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span>ID</span></dt>
          <dd>
            <span>{{ environmentVariableRef.id }}</span>
          </dd>
          <dt><span>Key</span></dt>
          <dd>
            <span>{{ environmentVariableRef.key }}</span>
          </dd>
          <dt><span>Value</span></dt>
          <dd>
            <span>{{ environmentVariableRef.value }}</span>
          </dd>
          <dt><span>Description</span></dt>
          <dd>
            <span>{{ environmentVariableRef.description }}</span>
          </dd>
          <dt><span>Type</span></dt>
          <dd>
            <span>{{ environmentVariableRef.type }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span>Back</span>
        </button>

        <button type="button" [routerLink]="['/environment-variable', environmentVariableRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span>Edit</span>
        </button>
      </div>
    }
  </div>
</div>
