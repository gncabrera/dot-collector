<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (profileRequestType(); as profileRequestTypeRef) {
      <div>
        <h2 data-cy="profileRequestTypeDetailsHeading"><span>Profile Request Type</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span>ID</span></dt>
          <dd>
            <span>{{ profileRequestTypeRef.id }}</span>
          </dd>
          <dt><span>Key</span></dt>
          <dd>
            <span>{{ profileRequestTypeRef.key }}</span>
          </dd>
          <dt><span>Name</span></dt>
          <dd>
            <span>{{ profileRequestTypeRef.name }}</span>
          </dd>
          <dt><span>Description</span></dt>
          <dd>
            <span>{{ profileRequestTypeRef.description }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span>Back</span>
        </button>

        <button type="button" [routerLink]="['/profile-request-type', profileRequestTypeRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span>Edit</span>
        </button>
      </div>
    }
  </div>
</div>
